<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family:Old ;
            src: url('fontes/OldLondon.ttf') format('truetype'), url('fontes/Oldlondon.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body{
            font-family:Arial, Helvetica, sans-serif ;
        }
        h1{
            font-family: 'Old', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
        p{
            font-family: 'Old', Times, serif;
            font-size: 1em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Francisco</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Vitae repellat eligendi quae officia, excepturi pariatur neque enim placeat aut atque odit itaque velit quo sunt voluptas esse, necessitatibus ad sint.</p>
</body>
</html>
