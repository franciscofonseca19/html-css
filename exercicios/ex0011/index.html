<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir esse site em vários disositivos diferentes ou simplismente aumente e diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width:750px )" srcset="imagens/foto-p.png" type="image/png">
     <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">   
        <img src="imagens/foto-g.png" alt="Imagem flexivel">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir Áudios em HTML5</p>
   <audio preload="metadata" autoplay controls loop>
    <source src="midias/watch-Blii.mp3.mp3" type="audio/mpeg">
    <source src="midias/watch-Blii.mp3.ogg" type="audio/ogg">
    <source src="midias/watch-Blii.mp3.wav" type="audio/wav">
   </audio>
   <p>Infelizmente o seu navegador não consegue reproduzir áudio <a href="midias/watch-Blii.mp3.mp3">Clique aqui para baixar o arquivo MP3</a>
    
</body>
</html>
